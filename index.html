<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TicTac Battle</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="background-glow"></div>
    <div class="container">
        <h1 class="logo">TicTac <span>Battle</span></h1>
        
        <div id="profileCard" class="card profile-header hidden">
            <img id="profileAvatar" class="profile-avatar" src="" alt="Avatar">
            <div class="profile-info">
                <h2 id="profileName"></h2>
                <p>Rating: <span id="profileRating">1000</span></p>
            </div>
        </div>

        <div class="card lobby-card">
            <button class="btn primary" id="createRoomBtn">Create Room (Bet 50)</button>
            <div class="join-section">
                <input type="text" id="roomCodeInput" placeholder="Room Code">
                <button class="btn secondary" id="joinRoomBtn">Join</button>
            </div>
            <button class="btn ghost" id="leaderboardBtn">Leaderboard</button>
        </div>
    </div>

    <div id="setupModal" class="modal">
        <div class="modal-content">
            <h2>New Warrior</h2>
            <input type="text" id="playerNameInput" placeholder="Enter Name">
            <div class="avatar-grid">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Cyber" class="avatar-option">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Ninja" class="avatar-option">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Alien" class="avatar-option">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=King" class="avatar-option">
                <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Warrior" class="avatar-option">
            </div>
            <button class="btn primary" id="saveProfileBtn">Enter Arena</button>
        </div>
    </div>

    <div id="leaderboardModal" class="modal" style="display:none">
        <div class="modal-content">
            <h2>Leaderboard</h2>
            <div id="leaderboardList"></div>
            <button class="btn secondary" id="closeLeaderboard">Close</button>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
