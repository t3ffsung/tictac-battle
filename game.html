<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battle Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="lobbyOverlay" class="modal" style="display:flex;">
        <div class="modal-content" style="text-align: center;">
            <h3>Waiting for Opponent...</h3>
            <p style="margin: 15px 0;">Share Room Code:</p>
            <h2 id="displayRoomCode" style="color:#39ff14; font-size: 2.5rem; letter-spacing: 3px;"></h2>
            <button class="btn ghost" onclick="location.href='index.html'">Cancel</button>
        </div>
    </div>

    <div class="container">
        <div class="game-header">
            <div id="playerX" class="p-tag">X: Waiting...</div>
            <div class="pot-tag">Pot: 100 🪙</div>
            <div id="playerO" class="p-tag">O: Waiting...</div>
        </div>

        <div class="board-container">
            <div class="board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>
            <svg id="winLine" viewBox="0 0 300 300"></svg>
        </div>

        <div id="gameStatus" class="status-msg">Your Turn</div>
        <button id="exitBtn" class="btn ghost">Exit Arena</button>
        <button id="audioToggleBtn" class="btn ghost" style="margin-top:10px;">🔊 Audio: ON</button>
    </div>

    <script type="module" src="js/game.js"></script>
</body>
</html>
